<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioKey - 3D Web Renderer</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* Custom Scrollbar for the panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }

        .glass-panel {
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: #444;
            border-radius: 2px;
            outline: none;
        }
        .slider-thumb::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            transition: background .15s ease-in-out;
        }
        .slider-thumb::-webkit-slider-thumb:hover {
            background: #60a5fa;
        }

        #loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            transition: opacity 0.5s;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-overlay">
        <div class="text-center">
            <div class="loader mx-auto mb-4"></div>
            <div class="text-gray-400 text-sm tracking-wider">INITIALIZING STUDIO</div>
        </div>
    </div>

    <!-- Main Canvas -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="absolute top-4 left-4 z-10">
        <h1 class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
            </svg>
            StudioRender
        </h1>
    </div>

    <!-- Controls Panel -->
    <div class="absolute top-4 right-4 w-72 glass-panel rounded-lg p-5 text-sm select-none z-20 max-h-[90vh] overflow-y-auto">
        
        <!-- File Upload -->
        <div class="mb-6">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Model</label>
            <div class="relative group">
                <input type="file" id="file-input" accept=".glb, .gltf" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                <div class="border-2 border-dashed border-gray-600 rounded-lg p-4 text-center group-hover:border-blue-500 transition-colors">
                    <p class="text-gray-300 group-hover:text-white">Drag & Drop GLB/GLTF</p>
                    <p class="text-xs text-gray-500 mt-1">or click to browse</p>
                </div>
            </div>
        </div>

        <hr class="border-gray-700 mb-6">

        <!-- Render Settings -->
        <div class="space-y-5">
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Exposure</label>
                    <span id="val-exposure" class="text-gray-500 font-mono text-xs">1.0</span>
                </div>
                <input type="range" min="0" max="3" step="0.1" value="1.0" id="inp-exposure" class="slider-thumb">
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Environment Intensity</label>
                    <span id="val-env" class="text-gray-500 font-mono text-xs">1.0</span>
                </div>
                <input type="range" min="0" max="5" step="0.1" value="1.0" id="inp-env" class="slider-thumb">
            </div>

             <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Ambient Occlusion (GTAO)</label>
                    <span id="val-ao" class="text-gray-500 font-mono text-xs">ON</span>
                </div>
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="inp-ao-toggle" checked class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-blue-600 focus:ring-blue-600">
                    <span class="text-xs text-gray-500">Enable GTAO</span>
                </div>
                
                <!-- Added View Output Toggle -->
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="inp-ao-view" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-purple-600 focus:ring-purple-600">
                    <span class="text-xs text-purple-400">View AO Only (Debug)</span>
                </div>

                <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-500">Distance Exponent</span>
                    <span id="val-ao-intensity" class="text-gray-500 font-mono text-xs">1.00</span>
                </div>
                <input type="range" min="0.1" max="3.0" step="0.01" value="1.0" id="inp-ao-intensity" class="slider-thumb mb-2">
                
                <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-500">Radius</span>
                    <span id="val-ao-radius" class="text-gray-500 font-mono text-xs">0.25</span>
                </div>
                <input type="range" min="0.1" max="1.0" step="0.01" value="0.25" id="inp-ao-radius" class="slider-thumb">
                
                <div class="flex justify-between mb-1 mt-2">
                    <span class="text-xs text-gray-500">Thickness</span>
                    <span id="val-ao-min" class="text-gray-500 font-mono text-xs">0.100</span>
                </div>
                <input type="range" min="0.01" max="1.0" step="0.01" value="0.1" id="inp-ao-min" class="slider-thumb">
            </div>
            
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Anti-Aliasing</label>
                    <span id="val-aa" class="text-gray-500 font-mono text-xs">OFF</span>
                </div>
                <div class="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="inp-aa-toggle" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-blue-600 focus:ring-blue-600">
                    <span class="text-xs text-gray-500">Enable AA</span>
                </div>
                
                <div class="flex justify-between mb-1">
                    <span class="text-xs text-gray-500">AA Quality</span>
                    <span id="val-aa-quality" class="text-gray-500 font-mono text-xs">1.0</span>
                </div>
                <input type="range" min="1.0" max="2.0" step="0.1" value="1.0" id="inp-aa-quality" class="slider-thumb">
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Background Blur</label>
                    <span id="val-blur" class="text-gray-500 font-mono text-xs">0.0</span>
                </div>
                <input type="range" min="0" max="1" step="0.05" value="0" id="inp-blur" class="slider-thumb">
            </div>

            <div>
                 <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Environment Rotation</label>
                    <span id="val-rot" class="text-gray-500 font-mono text-xs">0</span>
                </div>
                <input type="range" min="0" max="360" step="1" value="0" id="inp-rot" class="slider-thumb">
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Texture Scale</label>
                    <span id="val-tex-scale" class="text-gray-500 font-mono text-xs">1.0</span>
                </div>
                <input type="range" min="0.1" max="10" step="0.1" value="1.0" id="inp-tex-scale" class="slider-thumb">
            </div>

        <hr class="border-gray-700 my-6">

        <!-- Material Override (Only for default object mainly) -->
        <div class="space-y-4">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Material Overrides</label>
            
            <div id="selected-mesh-info" class="text-xs text-gray-500 mb-2">No mesh selected</div>
            
            <!-- Texture Inputs -->
            <div class="space-y-2">
                <div>
                    <label class="block text-xs text-gray-300">Color Texture</label>
                    <input type="file" id="inp-tex-color" accept="image/*" class="w-full text-xs text-gray-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-gray-600 file:text-white hover:file:bg-gray-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-300">Roughness Texture</label>
                    <input type="file" id="inp-tex-roughness" accept="image/*" class="w-full text-xs text-gray-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-gray-600 file:text-white hover:file:bg-gray-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-300">Metalness Texture</label>
                    <input type="file" id="inp-tex-metalness" accept="image/*" class="w-full text-xs text-gray-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-gray-600 file:text-white hover:file:bg-gray-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-300">Normal Texture</label>
                    <input type="file" id="inp-tex-normal" accept="image/*" class="w-full text-xs text-gray-300 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-gray-600 file:text-white hover:file:bg-gray-500">
                </div>
            </div>
            
            <!-- Scalar Properties -->
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Color</label>
                </div>
                <input type="color" id="inp-mat-color" value="#ffffff" class="w-full h-8 border border-gray-600 rounded">
            </div>
            
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Roughness</label>
                    <span id="val-mat-roughness" class="text-gray-500 font-mono text-xs">0.5</span>
                </div>
                <input type="range" min="0" max="1" step="0.01" value="0.5" id="inp-mat-roughness" class="slider-thumb">
            </div>
            
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-gray-300">Metalness</label>
                    <span id="val-mat-metalness" class="text-gray-500 font-mono text-xs">0.0</span>
                </div>
                <input type="range" min="0" max="1" step="0.01" value="0.0" id="inp-mat-metalness" class="slider-thumb">
            </div>
            
            <button id="btn-reset-materials" class="w-full bg-red-600 hover:bg-red-500 text-white py-2 px-4 rounded transition text-xs font-medium">
                Reset Materials
            </button>
        </div>

        <hr class="border-gray-700 my-6">

        <div class="space-y-4">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Actions</label>
            <button id="btn-reset" class="w-full bg-gray-700 hover:bg-gray-600 text-white py-2 px-4 rounded transition text-xs font-medium">
                Reset Camera
            </button>
            <button id="btn-screenshot" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 px-4 rounded transition text-xs font-medium">
                Capture Render
            </button>
        </div>
        
        <div class="mt-6 text-xs text-gray-600 text-center">
            Powered by Three.js
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { GTAOPass } from 'three/addons/postprocessing/GTAOPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        // State
        const state = {
            exposure: 1.0,
            envIntensity: 1.0,
            aoEnabled: true,
            aoDistanceExponent: 1.0,
            aoThickness: 0.1,
            aoRadius: 0.25,
            bgBlur: 0.80,
            envRotation: 0,
            aaEnabled: false,
            aaQuality: 1.0,
            textureScale: 1.0,
            material: {
                color: '#ffffff',
                roughness: 0.5,
                metalness: 0.0,
                textures: {
                    color: null,
                    roughness: null,
                    metalness: null,
                    normal: null
                }
            }
        };

        // Material management
        let originalMaterials = new Map(); // mesh -> original material
        let selectedMesh = null;
        const textureLoader = new THREE.TextureLoader();

        // Setup
        const container = document.getElementById('canvas-container');
        let renderer, composer, renderPass, aoPass, outputPass, controls;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 6);

        // Lights (Auxiliary for sharper shadows, though HDRI does most work)
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        // Store original position for rotation calculations
        const dirLightOriginalPos = new THREE.Vector3(5, 10, 7); 
        dirLight.position.copy(dirLightOriginalPos);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.bias = -0.0001;
        scene.add(dirLight);

        function createRenderer() {
            // Dispose old renderer
            if (renderer) {
                renderer.dispose();
                if (container.contains(renderer.domElement)) {
                    container.removeChild(renderer.domElement);
                }
            }

            renderer = new THREE.WebGLRenderer({ antialias: state.aaEnabled, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(state.aaQuality);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = state.exposure;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Update controls
            if (controls) {
                controls.dispose();
            }
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 0.5;
            controls.maxDistance = 50;

            // Attach click listener for mesh selection
            renderer.domElement.addEventListener('click', (event) => {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const objects = currentModel ? [currentModel] : [defaultMesh];
                const intersects = raycaster.intersectObjects(objects, true);
                if (intersects.length > 0) {
                    const mesh = intersects[0].object;
                    if (mesh.isMesh) {
                        selectedMesh = mesh;
                        document.getElementById('selected-mesh-info').textContent = `Selected: ${mesh.name || 'Mesh'}`;
                    }
                }
            });

            // Recreate composer and passes
            composer = new EffectComposer(renderer);
            
            renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const width = window.innerWidth;
            const height = window.innerHeight;
            aoPass = new GTAOPass(scene, camera, width, height);
            aoPass.radius = state.aoRadius; 
            aoPass.distanceExponent = state.aoDistanceExponent;
            aoPass.thickness = state.aoThickness;
            aoPass.output = GTAOPass.OUTPUT.Default;
            
            composer.addPass(aoPass);

            outputPass = new OutputPass();
            composer.addPass(outputPass);

            // Apply current state
            scene.environmentIntensity = state.envIntensity;
            scene.backgroundIntensity = state.envIntensity;
            scene.backgroundBlurriness = state.bgBlur;
            const rad = THREE.MathUtils.degToRad(state.envRotation);
            if (scene.backgroundRotation) scene.backgroundRotation.y = rad;
            if (scene.environmentRotation) scene.environmentRotation.y = rad;
            dirLight.position.copy(dirLightOriginalPos.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), rad));
        }

        // Initial creation
        createRenderer();

        // Lighting & Environment
        let envMap;
        
        const rgbeLoader = new RGBELoader();
        // Using a studio HDRI from Poly Haven (public domain)
        rgbeLoader.load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/studio_small_09_1k.hdr', function (texture) {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = texture;
            scene.background = texture;
            scene.backgroundBlurriness = state.bgBlur;
            envMap = texture;
            
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
            }, 500);
        });

        // Floor (Shadow Catcher)
        const planeGeometry = new THREE.PlaneGeometry(50, 50);
        const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = -0.01; // Slightly below zero
        plane.receiveShadow = true;
        scene.add(plane);

        // Default Object (Knot)
        let currentModel = null;
        const defaultGeometry = new THREE.TorusKnotGeometry(1, 0.3, 128, 32);
        const defaultMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xaaaaaa, 
            roughness: 0.2, 
            metalness: 0.8 
        });
        const defaultMesh = new THREE.Mesh(defaultGeometry, defaultMaterial);
        defaultMesh.castShadow = true;
        defaultMesh.receiveShadow = true;
        defaultMesh.position.y = 1.3;
        scene.add(defaultMesh);
        currentModel = defaultMesh;
        originalMaterials.set(defaultMesh, defaultMaterial.clone());
        selectedMesh = defaultMesh;
        document.getElementById('selected-mesh-info').textContent = 'Selected: Default Mesh';

        // Resize Handler
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // Raycaster for mesh selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Logic: Load Model
        const gltfLoader = new GLTFLoader();
        const fileInput = document.getElementById('file-input');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            
            // Show loader
            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('loading-overlay').style.opacity = '1';

            gltfLoader.load(url, (gltf) => {
                // Remove current model
                if (currentModel) {
                    scene.remove(currentModel);
                }

                const model = gltf.scene;
                
                // Normalize Scale and Position
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                // Scale to fit in a 4x4x4 box approximately
                const maxAxis = Math.max(size.x, size.y, size.z);
                const scaleFactor = 4 / maxAxis;
                
                model.scale.setScalar(scaleFactor);
                
                // Center model
                model.position.sub(center.multiplyScalar(scaleFactor));
                // Lift so bottom is at y=0
                model.position.y += (size.y * scaleFactor) / 2;

                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        // Improve material quality if needed
                        if (node.material.map) node.material.map.anisotropy = 8;
                        // Set texture scaling
                        const textures = [node.material.map, node.material.roughnessMap, node.material.metalnessMap, node.material.normalMap, node.material.emissiveMap, node.material.aoMap];
                        textures.forEach((texture) => {
                            if (texture) {
                                texture.repeat.set(state.textureScale, state.textureScale);
                                texture.wrapS = THREE.RepeatWrapping;
                                texture.wrapT = THREE.RepeatWrapping;
                            }
                        });
                    }
                });

                originalMaterials.clear();
                model.traverse((node) => {
                    if (node.isMesh) {
                        originalMaterials.set(node, node.material.clone());
                    }
                });

                scene.add(model);
                currentModel = model;
                selectedMesh = null;
                document.getElementById('selected-mesh-info').textContent = 'No mesh selected';

                // Cleanup
                URL.revokeObjectURL(url);
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                }, 500);

            }, undefined, (error) => {
                console.error(error);
                alert("Error loading model. Check console.");
                document.getElementById('loading-overlay').style.display = 'none';
            });
        });

        // Material Functions
        function applyMaterialOverrides(mesh) {
            if (!mesh || !mesh.material) return;
            const newMat = new THREE.MeshStandardMaterial();
            // Copy from original if possible
            if (originalMaterials.has(mesh)) {
                newMat.copy(originalMaterials.get(mesh));
            }
            // Apply overrides
            newMat.color.set(state.material.color);
            newMat.roughness = state.material.roughness;
            newMat.metalness = state.material.metalness;
            // Apply textures
            if (state.material.textures.color) {
                newMat.map = state.material.textures.color;
            }
            if (state.material.textures.roughness) {
                newMat.roughnessMap = state.material.textures.roughness;
            }
            if (state.material.textures.metalness) {
                newMat.metalnessMap = state.material.textures.metalness;
            }
            if (state.material.textures.normal) {
                newMat.normalMap = state.material.textures.normal;
            }
            // Set texture scaling for override textures
            const textures = [newMat.map, newMat.roughnessMap, newMat.metalnessMap, newMat.normalMap];
            textures.forEach((texture) => {
                if (texture) {
                    texture.repeat.set(state.textureScale, state.textureScale);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                }
            });
            mesh.material = newMat;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
        }

        function resetMaterials() {
            if (currentModel) {
                currentModel.traverse((node) => {
                    if (node.isMesh && originalMaterials.has(node)) {
                        node.material = originalMaterials.get(node);
                        node.castShadow = true;
                        node.receiveShadow = true;
                        if (node.material.map) node.material.map.anisotropy = 8;
                        // Set texture scaling
                        const textures = [node.material.map, node.material.roughnessMap, node.material.metalnessMap, node.material.normalMap, node.material.emissiveMap, node.material.aoMap];
                        textures.forEach((texture) => {
                            if (texture) {
                                texture.repeat.set(state.textureScale, state.textureScale);
                                texture.wrapS = THREE.RepeatWrapping;
                                texture.wrapT = THREE.RepeatWrapping;
                            }
                        });
                    }
                });
            }
            // Reset state
            state.material.color = '#ffffff';
            state.material.roughness = 0.5;
            state.material.metalness = 0.0;
            state.material.textures = { color: null, roughness: null, metalness: null, normal: null };
            // Update UI
            document.getElementById('inp-mat-color').value = state.material.color;
            document.getElementById('inp-mat-roughness').value = state.material.roughness;
            document.getElementById('val-mat-roughness').textContent = state.material.roughness.toFixed(2);
            document.getElementById('inp-mat-metalness').value = state.material.metalness;
            document.getElementById('val-mat-metalness').textContent = state.material.metalness.toFixed(2);
        }

        function updateTextureScale() {
            const scale = state.textureScale;
            if (currentModel) {
                currentModel.traverse((node) => {
                    if (node.isMesh && node.material) {
                        const textures = [node.material.map, node.material.roughnessMap, node.material.metalnessMap, node.material.normalMap, node.material.emissiveMap, node.material.aoMap];
                        textures.forEach((texture) => {
                            if (texture) {
                                texture.repeat.set(scale, scale);
                                texture.wrapS = THREE.RepeatWrapping;
                                texture.wrapT = THREE.RepeatWrapping;
                                texture.needsUpdate = true;
                            }
                        });
                    }
                });
            }
        }

        // Logic: UI Event Listeners
        document.getElementById('inp-exposure').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.exposure = val;
            renderer.toneMappingExposure = val;
            document.getElementById('val-exposure').textContent = val.toFixed(1);
        });

        document.getElementById('inp-env').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.envIntensity = val;
            scene.environmentIntensity = val;
            scene.backgroundIntensity = val; // Optional: dim background too
            document.getElementById('val-env').textContent = val.toFixed(1);
        });

        // --- SSAO CONTROLS UPDATED ---

        document.getElementById('inp-ao-toggle').addEventListener('change', (e) => {
            state.aoEnabled = e.target.checked;
            document.getElementById('val-ao').textContent = state.aoEnabled ? "ON" : "OFF";
            // Toggle logic: if OFF, we should perhaps just render normal scene, OR disable pass.
            // Since ssaoPass doesn't have 'enabled' property easily in chain without custom logic, 
            // we handle it in animate loop.
        });

        document.getElementById('inp-ao-view').addEventListener('change', (e) => {
             if (e.target.checked) {
                 aoPass.output = GTAOPass.OUTPUT.AO;
             } else {
                 aoPass.output = GTAOPass.OUTPUT.Default;
             }
        });

        // Formerly "Intensity", now mapped to distanceExponent which controls falloff
        // Higher exponent = tighter, darker shadows; Lower = softer, spread out
        document.getElementById('inp-ao-intensity').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.aoDistanceExponent = val;
            aoPass.distanceExponent = val;
            document.getElementById('val-ao-intensity').textContent = val.toFixed(2);
        });

        document.getElementById('inp-ao-radius').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.aoRadius = val;
            aoPass.radius = val;
            document.getElementById('val-ao-radius').textContent = val;
        });

        document.getElementById('inp-ao-min').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.aoThickness = val;
            aoPass.thickness = val;
            document.getElementById('val-ao-min').textContent = val.toFixed(3);
        });

        // --- AA CONTROLS ---

        document.getElementById('inp-aa-toggle').addEventListener('change', (e) => {
            state.aaEnabled = e.target.checked;
            document.getElementById('val-aa').textContent = state.aaEnabled ? "ON" : "OFF";
            createRenderer();
        });

        document.getElementById('inp-aa-quality').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.aaQuality = val;
            document.getElementById('val-aa-quality').textContent = val.toFixed(1);
            createRenderer();
        });

        // -----------------------------

        document.getElementById('inp-blur').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.bgBlur = val;
            scene.backgroundBlurriness = val;
            document.getElementById('val-blur').textContent = val.toFixed(2);
        });

        document.getElementById('inp-rot').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.envRotation = val;
            const rad = THREE.MathUtils.degToRad(val);
            
            // Safety checks for different three.js versions
            if (scene.backgroundRotation) scene.backgroundRotation.y = rad;
            if (scene.environmentRotation) scene.environmentRotation.y = rad;
            
            // Rotate Directional Light to match the environment rotation
            // We take the original position and rotate it around the Y axis
            if (dirLight && dirLightOriginalPos) {
                const vector = dirLightOriginalPos.clone();
                vector.applyAxisAngle(new THREE.Vector3(0, 1, 0), rad); 
                dirLight.position.copy(vector);
            }

            document.getElementById('val-rot').textContent = val;
        });

        document.getElementById('inp-tex-scale').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.textureScale = val;
            updateTextureScale();
            document.getElementById('val-tex-scale').textContent = val.toFixed(1);
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            camera.position.set(5, 3, 6);
            controls.target.set(0, 0, 0);
            controls.update();
        });

        document.getElementById('btn-screenshot').addEventListener('click', () => {
            render(); // Render once to ensure fresh
            const dataURL = renderer.domElement.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'studio_render.png';
            link.href = dataURL;
            link.click();
        });

        // Material UI Listeners
        document.getElementById('inp-tex-color').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                textureLoader.load(url, (texture) => {
                    texture.encoding = THREE.sRGBEncoding;
                    texture.anisotropy = 8;
                    texture.repeat.set(state.textureScale, state.textureScale);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    state.material.textures.color = texture;
                    if (selectedMesh) applyMaterialOverrides(selectedMesh);
                });
            }
        });

        document.getElementById('inp-tex-roughness').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                textureLoader.load(url, (texture) => {
                    texture.encoding = THREE.LinearEncoding;
                    texture.anisotropy = 8;
                    texture.repeat.set(state.textureScale, state.textureScale);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    state.material.textures.roughness = texture;
                    if (selectedMesh) applyMaterialOverrides(selectedMesh);
                });
            }
        });

        document.getElementById('inp-tex-metalness').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                textureLoader.load(url, (texture) => {
                    texture.encoding = THREE.LinearEncoding;
                    texture.anisotropy = 8;
                    texture.repeat.set(state.textureScale, state.textureScale);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    state.material.textures.metalness = texture;
                    if (selectedMesh) applyMaterialOverrides(selectedMesh);
                });
            }
        });

        document.getElementById('inp-tex-normal').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                textureLoader.load(url, (texture) => {
                    texture.encoding = THREE.LinearEncoding;
                    texture.anisotropy = 8;
                    texture.repeat.set(state.textureScale, state.textureScale);
                    texture.wrapS = THREE.RepeatWrapping;
                    texture.wrapT = THREE.RepeatWrapping;
                    state.material.textures.normal = texture;
                    if (selectedMesh) applyMaterialOverrides(selectedMesh);
                });
            }
        });

        document.getElementById('inp-mat-color').addEventListener('input', (e) => {
            state.material.color = e.target.value;
            if (selectedMesh) applyMaterialOverrides(selectedMesh);
        });

        document.getElementById('inp-mat-roughness').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.material.roughness = val;
            document.getElementById('val-mat-roughness').textContent = val.toFixed(2);
            if (selectedMesh) applyMaterialOverrides(selectedMesh);
        });

        document.getElementById('inp-mat-metalness').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            state.material.metalness = val;
            document.getElementById('val-mat-metalness').textContent = val.toFixed(2);
            if (selectedMesh) applyMaterialOverrides(selectedMesh);
        });

        document.getElementById('btn-reset-materials').addEventListener('click', resetMaterials);

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            render();
        }

        // Initial render call
        animate();

        function render() {
             if (state.aoEnabled) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

    </script>
</body>
</html>
